services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: sqlite:////app/backend/data/red_alert.db
      CORS_ORIGINS: http://localhost:3000
      TELEGRAM_ENABLED: "false"
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/backend/data
    command: >
      sh -c "alembic upgrade head
      && python app/scripts/seed_regions.py --skip-if-exists
      && python app/scripts/seed_locations.py --skip-if-exists
      && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  sqlite_data:
